services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-cookbook}
      POSTGRES_USER:     ${POSTGRES_USER:-cookbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cookbook}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cookbook} -d ${POSTGRES_DB:-cookbook}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SECRET_KEY:          ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG:               ${DEBUG:-False}
      ALLOWED_HOSTS:       ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8888}
      POSTGRES_DB:         ${POSTGRES_DB:-cookbook}
      POSTGRES_USER:       ${POSTGRES_USER:-cookbook}
      POSTGRES_PASSWORD:   ${POSTGRES_PASSWORD:-cookbook}
      POSTGRES_HOST:       db
      POSTGRES_PORT:       5432
    volumes:
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8888}:80"
    volumes:
      - media_files:/app/media:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files:

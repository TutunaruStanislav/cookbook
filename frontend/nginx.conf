server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API requests to Django/Gunicorn
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # API docs at the root: /docs, /redoc, /api-docs (Swagger UI / ReDoc)
    location ~ ^/(docs|redoc|api-docs)(/|$) {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Proxy Django admin static files (served by WhiteNoise)
    location /static/ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
        expires          30d;
    }

    # Media files served directly from shared volume
    location /media/ {
        alias   /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # React SPA — all other paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
